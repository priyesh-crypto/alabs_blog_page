<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003b93"/>
      <stop offset="100%" stop-color="#0051c3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <text x="200" y="215" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="800" font-size="150" fill="#ffffff" text-anchor="middle" letter-spacing="-4">AL</text>
    <text x="200" y="285" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="600" font-size="36" fill="#b1c5ff" text-anchor="middle" letter-spacing="6">LABS</text>
  </g>
  <circle cx="200" cy="340" r="4" fill="#b1c5ff"/>
</svg>
